<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가톨릭 기도서</title>
    <style>
        :root {
            --main-brown: #5d4037;
            --soft-beige: #f5f5f0;
            --accent-gold: #c5a059;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Nanum Myeongjo', serif; /* 명조체 계열 권장 */
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--soft-beige);
            color: var(--text-dark);
        }

        /* 왼쪽 목차 사이드바 */
        #sidebar {
            width: 350px;
            background: white;
            border-right: 2px solid var(--accent-gold);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
        }

        .sidebar-header {
            padding: 25px;
            background: var(--main-brown);
            color: white;
            text-align: center;
        }

        .sidebar-header h1 {
            font-size: 1.4rem;
            margin: 0;
            letter-spacing: 2px;
        }

        .prayer-list {
            padding: 10px 0;
        }

        .prayer-item {
            padding: 15px 25px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .prayer-item:hover {
            background-color: #fcf8f0;
            color: var(--main-brown);
        }

        .prayer-item.active {
            background-color: var(--soft-beige);
            color: var(--main-brown);
            font-weight: bold;
            border-left: 5px solid var(--main-brown);
        }

        /* 오른쪽 본문 영역 */
        #content-area {
            flex: 1;
            padding: 60px;
            display: flex;
            justify-content: center;
            overflow-y: auto;
        }

        .prayer-card {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 60px;
            border-radius: 5px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            height: fit-content;
            position: relative;
        }

        .prayer-card::before {
            content: "†";
            display: block;
            text-align: center;
            font-size: 2rem;
            color: var(--accent-gold);
            margin-bottom: 20px;
        }

        h2#display-title {
            text-align: center;
            font-size: 2rem;
            color: var(--main-brown);
            margin-bottom: 40px;
            word-break: keep-all;
        }

        #display-text {
            font-size: 1.15rem;
            line-height: 2;
            white-space: pre-wrap;
            text-align: justify;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 40vh; border-right: none; border-bottom: 2px solid var(--accent-gold); }
            #content-area { padding: 20px; }
            .prayer-card { padding: 30px; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h1>가톨릭 기도서</h1>
    </div>
    <div class="prayer-list" id="prayer-menu">
        </div>
</div>

<div id="content-area">
    <div class="prayer-card">
        <h2 id="display-title">기도를 시작하며</h2>
        <div id="display-text">목차에서 기도문을 선택해 주세요. 주님의 평화가 함께하시길 빕니다.</div>
    </div>
</div>

<script>
    const prayerData = [
        { title: "2025년 희년기도", content: `하늘에 계신 아버지,\n우리 형제이신 성자 예수 그리스도를 통하여 저희에게 베풀어 주신 믿음과 성령을 통하여 저희 마음에 부어 주신 불타는 사랑으로 아버지의 나라가 오시리라는 복된 희망을 저희에게 다시 일깨워 주소서.\n\n악의 세력이 패배하고 아버지의 영광이 영원히 드러나는 새 하늘과 새 땅을 확신에 차 기다리며 온 인류와 우주가 떨쳐 일어나도록 아버지의 은총으로 저희가 복음의 씨를 뿌리는 성실한 일꾼이 되게 하소서.\n\n희년의 은총이 희망의 순례자인 우리 안에서 천상 보화를 향한 갈망을 다시 불러일으키고 우리 구원자이신 주님의 기쁨과 평화가 온 세상에 흘러넘치게 하소서.\n\n영원히 복되신 하느님께서는 세세 대대로 찬미와 영광을 받으소서.\n\n아멘.` },
        { title: "그리스도교 일치를 위한 기도", content: `주 예수 그리스도님,\n주님께서는 돌아가시기 전날 밤에 아버지께 기도하신 대로 주님과 아버지께서 하나이시듯 주님을 믿는 모든 이가 하나 되기를 바라셨나이다.\n\n저희는 같은 믿음으로 세례를 받고 같은 주님을 모시면서도 서로 갈라져 주님의 뜻을 이루지 못하고 있나이다.\n\n이제 저희는 한마음으로 기도하며 하나가 되고자 하오니 저희를 도와주시어 미움과 불신을 버리고 진리 안에서 서로 사랑하며 하나의 공동체를 이루게 하소서.\n\n아멘.` },
        { title: "성전 건립 기도", content: `○ 지극히 자비로우신 주 하느님,\n주님께서는 세례로 저희를 새로 태어나게 하시고 거룩한 교회의 한가족이 되게 해주셨으니 감사하나이다.\n\n● 저희는 주님께서 주신 거룩한 품위를 지키지 못하고 온갖 욕심과 오만으로 가득 차 주님의 뜻을 소홀히 했나이다.\n\n○ 이제 주님의 자비를 청하며 저희가 힘을 모아 주님을 예배할 새 성전을 세우고 그곳에서 주님의 뜻을 이룩하여 사랑과 일치의 공동체를 가꾸어 나가고자 하오니 저희를 지켜주시고 이끌어주소서.\n\n● 주님께서 손수 이 본당 공동체의 역사를 주관하시어 이 성전 건축을 계기로 저희가 하나 되고 형제적 사랑과 나눔이 충만한 공동체가 되게 하소서. 마침내 성전이 완성되는 날 저희가 모두 기쁜 마음으로 주님을 찬미하게 하소서.\n\n우리 주 그리스도를 통하여 비나이다.\n\n◎ 아멘.` },
        { title: "가경자 최양업 토마스 신부 시복 시성 기도문", content: `지극히 좋으신 하느님,\n최양업 토마스 신부를 박해로 고통받는 교회의 든든한 목자로 세워 주셨음에 감사드리나이다.\n\n모든 교우들이 오로지 하느님 자비에 희망을 두고 박해를 피해 산골 깊이 숨어 신앙을 지켜야 했던 시대에 최양업 토마스 신부는 주님을 닮은 착한 목자로 목숨이 다할 때까지 쉼 없이 양들을 찾아 복음을 전하고 주님께서 이루신 구원의 은총을 전했나이다.\n\n자비로우신 하느님 아버지, 간절히 청하오니 가경자 최양업 토마스 신부에게 시복 시성의 은혜를 허락하시어 그에게 주셨던 굳건한 믿음과 온전한 헌신의 정신을 본받아 오늘 저희도 한마음으로 복음을 살고 전하는 일꾼이 되게 하소서.\n\n저희는 가경자 최양업 신부의 시복 시성의 은총을 빌며 그의 전구에 힘입어 문호리 본당을 위하여 (...) 기도드리오니 들어주소서.\n\n우리 주 그리스도를 통하여 비나이다.\n아멘.` },
        { title: "성 요셉에게 바치는 기도", content: `* 우리 주 예수님을 기르신 아버지시요\n* 정결하신 동정 마리아의 배필이시며\n* 임종하는 이의 수호자이신 성 요셉께 간절히 청하오니\n* 하느님께 빌어주시어 저희가 예수님을 사랑하며 충실히 따르게 하소서.\n* 또한 죽을 때에 저희를 지켜주소서.\n\n◎ 아멘.` },
        { title: "피조물과 함께 드리는 기도", content: `아버지, 전능하신 아버지의 손으로 빚으신 모든 피조물과 함께 찬미하나이다. 모든 피조물은 아버지의 것이고 아버지의 현존과 온유로 충만하나이다. 찬미받으소서!\n\n하느님의 아드님이신 예수님, 주님에게서 만물이 창조되었나이다. 주님께서는 성모 마리아께 잉태되시어 이 땅에 속하시며 인간의 눈으로 이 세상을 바라보셨나이다. 주님께서는 오늘날에도 부활하신 분의 영광으로 모든 피조물 안에 살아 계시나이다. 찬미받으소서!\n\n성령님, 성령님께서는 당신의 빛으로 이 세상을 아버지의 사랑으로 이끄시며 고통 가운데 신음하는 피조물과 함께하시나이다. 또한 성령님께서는 저희 마음 안에 머무르시며 저희를 선으로 이끄시나이다. 찬미받으소서!\n\n삼위일체이신 주 하느님, 하느님께서는 한없는 사랑의 놀라운 친교를 이루는 분이시니 모든 것이 하느님을 이야기하는 세계의 아름다움 안에서 저희가 하느님을 바라보도록 가르쳐 주소서. 하느님께서 창조하신 모든 존재에 대하여 저희가 찬미와 감사를 드리도록 일깨워 주소서. 저희가 존재하는 모든 것과 내적 일치를 느끼도록 저희에게 은총을 내려 주소서.\n\n사랑의 하느님, 이 세상에 저희에게 맞갖은 자리를 보여 주시어 저희가 이 땅에 있는 모든 것을 위한 하느님 사랑의 도우가 되게 하소서. 하느님께서 기억하지 않으시는 존재는 하나도 없기 때문이나이다. 가난한 이들과 이 땅이 절규하고 있나이다.\n\n주님, 주님의 힘과 빛으로 저희를 붙잡아 주시어 저희가 모든 생명을 보호하며 더 나은 미래를 마련하여 정의와 평화와 사랑과 아름다움의 하느님 나라가 오게 하소서.\n\n찬미받으소서! 아멘.` },
        { title: "우리의 지구를 위한 기도", content: `전능하신 하느님, 하느님께서는 온 세계에 계시며 가장 작은 피조물 안에 계시나이다. 존재하는 모든 것을 온유로 감싸 안으시는 하느님, 저희에게 사랑의 힘을 부어주시어 저희가 생명과 아름다움을 보살피게 하소서.\n\n오, 가난한 이들의 하느님, 저희를 도와주시어 저희가 하느님 보시기에 참으로 소중한 이들, 이 지구의 버림받고 잊힌 이들을 구하게 하소서. 저희 삶을 치유해 주시어 저희가 이 세상을 약탈하지 않고 보호하게 하시며 오염과 파괴가 아닌 아름다움의 씨앗을 뿌리게 하소서.\n\n하느님, 날마다 저희와 함께해 주시니 감사드리나이다. 비오니, 정의와 사랑과 평화를 위한 투쟁에서 저희에게 힘을 주소서.` },
        { title: "시노드를 위한 기도", content: `주 성령님, 저희가 주님의 이름으로 함께 모여 주님 앞에 있나이다. 주님만이 저희를 이끄시니 저희와 함께하시고 저희 마음에 머무소서. 저희가 나아갈 길을 보여 주시고 해야 할 일을 가르치소서.\n\n나약한 죄인인 저희가 정의를 외면하여 혼란을 일으키지 않게 하시고 무지의 오류에 빠지지 않게 하소서. 또한, 아무도 차별하지 않게 하소서.\n\n저희가 주님 안에서 하나 되어 영원한 생명의 길을 함께 걸어가게 하시고 저희가 언제나 진리를 따르며 의로움을 찾게 하소서.\n\n성부와 성자와 함께 영원히 친교를 이루시며 언제 어디서나 저희를 도우시는 성령께 이 모든 것을 간청하나이다. 아멘.` },
        { title: "성모성월 기도", content: `○ 내 영혼이 주님을 찬양하고 내 구원자 하느님 안에서 내 마음 기뻐 뛰노네.\n● 그분은 비천한 당신 종을 굽어보셨네. 이제부터 과연 모든 세대가 나를 복되다 하리라.\n○ 전능하신 분이 나에게 큰일을 하셨으니 그 이름은 거룩하신 분이시다.\n● 그분 자비는 세세 대대로 그분을 두려워하는 이들에게 미치리라.\n○ 그분은 당신 팔로 권능을 떨치시어 마음이 교만한 자들을 흩으셨네.\n● 권세 있는 자를 자리에서 내치시고 비천한 이를 들어 올리셨네.\n○ 굶주린 이를 좋은 것으로 채워 주시고 부유한 자를 빈손으로 돌려보내셨네.\n● 당신 자비를 기억하시어 당신 종 이스라엘을 돌보셨으니\n○ 우리 조상들에게 말씀하신 대로 아브라함과 그 후손에게 그분의 자비 영원하리라.\n● 영광이 성부와 성자와 성령께\n○ 처음과 같이 이제와 항상 영원히. 아멘.\n\n╋ 기도합시다.\n저희를 하느님 아버지께 이끄시는 주 예수 그리스도님, 주님의 어머니 동정 마리아를 저희 어머니가 되게 하시고 저희의 전구자로 세우셨나이다. 비오니, 성모 마리아의 전구를 들으시어 저희가 주님께 간구하는 모든 은혜를 받아 누리게 하소서.\n◎ 아멘.` },
        { title: "성소를 위한 교황 성하의 기도", content: `자비의 하느님 아버지,\n당신께서는 우리의 구원을 위하여 당신의 아드님을 내주시고 당신 성령의 은사로 언제나 우리에게 힘을 주시는 분이시니, 우리 그리스도인 공동체가 활기와 열정과 기쁨이 넘치고, 형제적인 삶의 원천이 되며, 젊은이들에게 당신과 복음화를 위한 자기 봉헌의 원의를 불러일으키도록 하여주소서.\n\n적절한 성소 교리 교육과 개별적인 봉헌의 길들을 제시하는 우리 그리스도인 공동체의 노력에 힘을 돋우어 주소서. 성소 식별에 필요한 지혜를 주시어, 당신의 위대한 자비로운 사랑이 모든 것을 비추게 하소서.\n\n우리 주 예수 그리스도를 통하여 비나이다. 아멘.` },
        { title: "성소를 위한 기도", content: `○ 좋으신 목자 예수님, 사도들을 부르시어 사람 낚는 어부가 되게 하셨나이다.\n● 비오니, 오늘도 믿음직한 젊은이들을 많이 부르시어 주님의 제자로 삼으시고 주님의 일꾼으로 삼으소서.\n○ 온 인류의 구원을 바라시는 주님, 수많은 사람들이 진리의 빛과 사랑의 불을 갈망하고 있사오니\n● 많은 젊은이들이 그 갈망에 응답하여 땅끝까지 복음을 전하며 세상의 빛과 소금이 되게 하소서.\n◎ 아멘.` },
        { title: "부활 삼종기도", content: `○ 하늘의 모후님, 기뻐하소서. 알렐루야.\n● 태중에 모시던 아드님께서, 알렐루야.\n○ 말씀하신 대로 부활하셨나이다. 알렐루야.\n● 저희를 위하여 하느님께 빌어주소서. 알렐루야.\n○ 동정 마리아님, 기뻐하시며 즐거워하소서. 알렐루야.\n● 주님께서 참으로 부활하셨나이다. 알렐루야.\n\n╋ 기도합시다.\n하느님, 성자 우리 주 예수 그리스도의 부활로 온 세상을 기쁘게 하셨으니 성자의 어머니 동정 마리아의 도움으로 영생의 즐거움을 얻게 하소서. 우리 주 그리스도를 통하여 비나이다.\n◎ 아멘.` },
        { title: "가정을 위한 기도 1", content: `○ 마리아와 요셉에게 순종하시며 가정생활을 거룩하게 하신 예수님, 저희 가정을 거룩하게 하시고 저희가 성가정을 본받아 주님의 뜻을 따라 살게 하소서.\n● 가정생활의 자랑이며 모범이신 성모 마리아와 성 요셉, 저희 집안을 위하여 빌어주시어 모든 가족이 건강하고 행복하게 하시며 언제나 주님을 섬기고 이웃을 사랑하며 살다가 주님의 은총으로 영원한 천상 가정에 들게 하소서.\n◎ 아멘.` },
        { title: "새 가족 찾기 기도문", content: `모든 이들에게 지극한 자비와 사랑을 베푸시는 하느님 아버지, 찬미받으소서!\n저희 공동체는 선교의 열정으로 하느님께 새 가족을 찾아 봉헌하고자 합니다.\n\n주님! 그들에게 참된 진리와 구원의 기쁜 소식을 받아들일 수 있는 마음을 열어 주시어 하루빨리 아버지의 품안으로 찾아오게 하소서.\n\n그리하여 저희 문호리본당 공동체가 신앙공동체로 거듭나 아버지께는 찬미와 영광이 되고 저희 모두에게는 구원에 이르는 삶이 되게 하소서.\n우리 주 예수 그리스도를 통하여 비나이다. 아멘.` },
        { title: "민족의 화해와 일치를 위한 기도", content: `○ 사람을 당신의 모습대로 지어내신 주님, 저희가 모두 주님을 닮게 하소서.\n● 사랑으로 하나 되신 주님처럼 저희가 서로 사랑하여 하나 되게 하소서.\n○ 평화를 바라시는 주님, 이 나라 이땅에 잃어버린 평화를 되찾게 하소서.\n● 분단의 깊은 상처를 낫게 하시고 서로 용서하는 화해의 은총을 내려주소서.\n\n우리 주 그리스도를 통하여 비나이다.\n◎ 아멘.` },
        { title: "한국 순교자들에게 바치는 기도", content: `○ 이땅의 모든 순교자여, 당신들은 하느님의 은총에 힘입어 굳은 신앙으로 예수 그리스도의 사랑과 복음과 교회를 위하여 피를 흘리셨나이다.\n● 저희는 현세에서 악의 세력과 치열하게 싸우며 당신들이 거두신 승리의 영광을 노래하오니 저희를 위하여 빌어 주소서.\n○ 성 김대건 안드레아와 성 정하상 바오로와 동료 순교자들이여,\n● 저희를 위하여 빌어주소서.` },
        { title: "위령성월 기도", content: `○ 깊은 구렁 속에서 주님, 당신께 부르짖나이다.\n● 주님, 제 소리를 들어 주소서. 애원하는 제 소리에 당신 귀를 기울이소서.\n\n╋ 기도합시다.\n사람을 창조하시고 믿는 이들을 구원하시는 하느님, 저희의 간절한 기도를 들으시어 주님을 섬기던 사람들의 죄를 용서하시고 그들이 바라던 영원한 행복을 얻게 하소서.\n우리 주 그리스도를 통하여 비나이다.\n\n╋ 주님, 그들에게 영원한 안식을 주소서.\n◎ 영원한 빛을 그들에게 비추소서.` }
    ];

    const menu = document.getElementById('prayer-menu');
    const displayTitle = document.getElementById('display-title');
    const displayText = document.getElementById('display-text');

    function init() {
        prayerData.forEach((prayer, index) => {
            const item = document.createElement('div');
            item.className = 'prayer-item';
            item.innerText = prayer.title;
            
            item.onclick = () => {
                // 스타일 업데이트
                document.querySelectorAll('.prayer-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');

                // 본문 업데이트
                displayTitle.innerText = prayer.title;
                displayText.innerText = prayer.content;

                // 모바일에서 아래로 이동
                if(window.innerWidth <= 768) {
                    document.getElementById('content-area').scrollIntoView({behavior: 'smooth'});
                }
            };
            menu.appendChild(item);
        });
    }

    init();
</script>

</body>
</html>
