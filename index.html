<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기도문 목록</title>
    <style>
        body { font-family: serif; line-height: 1.8; padding: 20px; background: #fffaf0; }
        .prayer-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #ddd; }
        h1 { text-align: center; color: #5a4a42; }
        h2 { border-bottom: 2px solid #5a4a42; padding-bottom: 10px; color: #5a4a42; }
        .content { white-space: pre-wrap; font-size: 1.1rem; color: #333; }
    </style>
</head>
<body>
    <h1>🙏 오늘의 기도문</h1>
    <div id="display">불러오는 중...</div>

    <script>
        // data.json 파일을 읽어서 화면에 표시
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const display = document.getElementById('display');
                display.innerHTML = "";
                data.reverse().forEach(p => { // 최신글이 위로 오게
                    display.innerHTML += `
                        <div class="prayer-card">
                            <h2>${p.title}</h2>
                            <div class="content">${p.content}</div>
                            <p style="font-size:0.8rem; color:gray; text-align:right;">${p.date}</p>
                        </div>`;
                });
            })
            .catch(() => {
                document.getElementById('display').innerText = "아직 등록된 기도문이 없습니다.";
            });
    </script>
</body>
</html>
